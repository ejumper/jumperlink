<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumperlink</title>
    <meta name="description" content="Personal dashboard with Wikipedia search, RSS feeds, and bookmarks">

    <!-- OpenSearch for custom search engine -->
    <link rel="search" type="application/opensearchdescription+xml" title="Jumperlink Search" href="/opensearch.xml">

    <!-- Favicons / App Icons -->
    <link rel="icon" type="image/webp" sizes="192x192" href="icons/web.webp">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/web.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/web.png">
    <link rel="apple-touch-icon" href="icons/desktop.png">
    <meta name="apple-mobile-web-app-title" content="Jumperlink">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="icons/desktop.png">

    <!-- Open Graph meta tags for better link sharing -->
    <meta property="og:title" content="Jumperlink Dashboard">
    <meta property="og:description" content="Personal dashboard with Wikipedia search, RSS feeds, and bookmarks">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="body.css">
</head>
<body>
    <top>
        <header>
            <div class="header-main">
                <search-container>
                    <button class="search-trigger" aria-label="Open search"><img src="icons/search.svg" alt="Search" class="search-icon"></button>
                </search-container>
                <main-text>
                    <page-title>
                        <div class="page-title-display">
                            <p>Title or Search</p>
                        </div>
                        <input type="text" id="searchbox" class="page-title-input" placeholder="Search...">
                    </page-title>
                    <subtitle><p>subtitle</p></subtitle>
                </main-text>
            </div>
            
        </header>
        <overview><div class="header-active-bar" aria-live="polite" aria-label="Active timers"></div></overview>
    </top>
    <bottom>
        <text></text>
        <links>
            <dock></dock>
            <search-container>
                <button class="search-trigger" aria-label="Open search"><img src="icons/search.svg" alt="Search" class="search-icon"></button>
            </search-container>
        </links>
    </bottom>
    <script src="intervalTimer.js"></script>
    <script src="script.js"></script>
</body>
</html>
